version: 2
updates:
  - package-ecosystem: "nuget"
    directories:
      - "/src/MonitorControlSDK"
      - "/src/MonitorControl.Cli"
      - "/src/MonitorControl.Web"
      - "/tests/MonitorControlSDK.Tests"
      - "/samples/Sample.BroadcastControl"
      - "/samples/Sample.Discovery"
      - "/samples/Sample.UdpVmcBroadcast"
      - "/samples/Sample.Vma"
      - "/samples/Sample.Vmc"
      - "/samples/Sample.Vms"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dotnet-dependencies:
        patterns:
          - "*"
    ignore:
      # CLI uses beta API surface; upgrade deliberately when migrating to stable System.CommandLine.
      - dependency-name: "System.CommandLine"
      - dependency-name: "Microsoft.NET.Test.Sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Swashbuckle.AspNetCore"
        update-types: ["version-update:semver-major"]
      - dependency-name: "xunit"
        update-types: ["version-update:semver-major"]
      - dependency-name: "xunit.runner.visualstudio"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

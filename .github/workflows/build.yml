name: build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet build Sony.MonitorControl.sln -c Release
      - run: dotnet test Sony.MonitorControl.sln -c Release --no-build
